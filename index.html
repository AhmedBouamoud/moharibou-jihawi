function toast(m){let t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600)} function beep(type='click'){if(!soundOn)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();let fs={click:[420],success:[660,880],error:[180,130],finish:[650,850,1050],coin:[950,1250]}[type]||[420];fs.forEach((f,i)=>setTimeout(()=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=f;o.type=type==='error'?'sawtooth':'sine';g.gain.value=.055;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.22);o.stop(audioCtx.currentTime+.24)},i*80))}catch(e){}} function toggleSound(){soundOn=!soundOn;localStorage.setItem(LS.sound,soundOn?'on':'off');$('soundLabel').textContent=soundOn?'الصوت':'صامت';toast(soundOn?'🔊 الصوت مفعل':'🔇 صامت')} function theme(){document.body.classList.toggle('light');localStorage.setItem(LS.theme,document.body.classList.contains('light')?'light':'dark')}
function confetti(n=60){let c=$('confetti');c.innerHTML='';let icons=['🎉','✨','🏆','💎','📘','🇲🇦','🔥'];for(let i=0;i<n;i++){let s=document.createElement('span');s.textContent=icons[Math.floor(Math.random()*icons.length)];s.style.left=Math.random()*100+'vw';s.style.animationDelay=Math.random()*.45+'s';c.appendChild(s)}setTimeout(()=>c.innerHTML='',2400)} function modal(h){$('modalContent').innerHTML=h;$('modal').classList.add('show');beep('click')} function closeModal(){$('modal').classList.remove('show')}
function initMenu(){let side=$('menu'),mob=$('mobile');menus.forEach(m=>{let b=document.createElement('button');b.className='nav';b.id='nav-'+m[0];b.innerHTML='<span class="ico">'+m[1]+'</span><span>'+m[2]+'</span>';b.onclick=()=>show(m[0]);side.appendChild(b);let mb=document.createElement('button');mb.className='btn ghost';mb.innerHTML='<span class="ico">'+m[1]+'</span> '+m[2];mb.onclick=()=>show(m[0]);mob.appendChild(mb)})} function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(v).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));let nb=$('nav-'+v);if(nb)nb.classList.add('active');let m=menus.find(x=>x[0]===v);$('pageTitle').textContent=m[2];$('pageDesc').textContent='كل زر في هذا القسم يعمل بوظيفة مباشرة.';beep('click'); if(v==='home')home();if(v==='map')map();if(v==='lessons')renderLessons();if(v==='ai')AI();if(v==='battle')battleStart();if(v==='exam')examStart();if(v==='flash')flash();if(v==='missions')missions();if(v==='achievements')achievements();if(v==='teacher')teacher();if(v==='certificate')cert();window.scrollTo({top:0,behavior:'smooth'})}
function home(){let total=lessons().length,d=done().length,terms=lessons().reduce((a,l)=>a+l.terms.length,0),qs=lessons().reduce((a,l)=>a+l.quiz.length,0);$('home').innerHTML=`<div class="hero"><div class="card"><h1>رحلة الجهوي <span class="goldText">V3 المكتملة</span></h1><p>نسخة أكثر اكتمالاً: خريطة، دروس، معركة، امتحان، باحث داخلي، بطاقات، أوسمة، شهادة، صوت، وطباعة.</p><div class="actions"><button class="btn green" onclick="show('map')">ابدأ من الخريطة</button><button class="btn gold" onclick="show('exam')">محاكي الامتحان</button><button class="btn" onclick="show('battle')">معركة المعرفة</button></div></div><div class="card scene"><div class="orb o1" onclick="show('achievements')" title="الأوسمة">🏆</div><div class="orb o2" onclick="show('flash')" title="البطاقات السحرية">💎</div><div class="orb o3" onclick="show('certificate')" title="الشهادة">📜</div><div><div class="mascot" onclick="show('map')" title="خريطة الرحلة" style="cursor:pointer">🧭</div><h2>كنوز الاجتماعيات</h2><p>كل محطة تفتح مهارة جديدة</p></div></div></div><div class="grid four" style="margin-top:16px"><div class="card stat" onclick="show('lessons')" title="افتح الدروس"><div>الدروس<br><b>${total}</b></div><div class="ico">📚</div></div><div class="card stat" onclick="show('map')" title="خريطة الرحلة"><div>أنجزت<br><b>${d}</b></div><div class="ico">✅</div></div><div class="card stat" onclick="show('flash')" title="البطاقات السحرية"><div>مصطلحات<br><b>${terms}</b></div><div class="ico">🧠</div></div><div class="card stat" onclick="show('battle')" title="معركة المعرفة"><div>أسئلة<br><b>${qs}</b></div><div class="ico">🎯</div></div></div>`}
function openLesson(id){let l=lessons().find(x=>x.id===id);subject=l.subject;currentLesson=byS(subject).findIndex(x=>x.id===id);show('lessons')} function map(){let d=done();$('map').innerHTML=`<div class="card"><h2 class="title">خريطة الرحلة</h2><p>اضغط على أي محطة. الأخضر يعني أنها منجزة.</p><div class="mapPath">${lessons().map((l,i)=>`<div class="station ${d.includes(l.id)?'done':''}" onclick="openLesson('${l.id}')"><div class="em">${l.icon}</div><h4>${i+1}. ${l.title}</h4><small>${d.includes(l.id)?'منجز':'افتح المحطة'}</small></div>`).join('')}</div></div>`}
function renderLessons(){$('lessons').innerHTML=`<div class="tabs"><button class="tab ${subject==='history'?'active':''}" onclick="setS('history')">التاريخ</button><button class="tab ${subject==='geo'?'active':''}" onclick="setS('geo')">الجغرافيا</button><button class="tab ${subject==='civic'?'active':''}" onclick="setS('civic')">المواطنة</button></div><div class="lessonLayout"><div class="card"><h3 class="title">الدروس</h3><div class="lessonList" id="lessonList"></div></div><div class="white card" id="lessonContent"></div></div>`;let list=$('lessonList'),d=done();byS(subject).forEach((l,i)=>{let b=document.createElement('button');b.className='lessonBtn '+(i===currentLesson?'active ':'')+(d.includes(l.id)?'done':'');b.innerHTML=`<span>${l.icon} ${i+1}. ${l.title}</span><span>${d.includes(l.id)?'✅':'🎮'}</span>`;b.onclick=()=>{currentLesson=i;renderLessons()};list.appendChild(b)});lessonContent()} function setS(s){subject=s;currentLesson=0;renderLessons()} function mark(id){let d=done();if(!d.includes(id)){d.push(id);saveDone(d);addXP(30);toast('تم إنجاز محطة +30 XP');beep('finish');confetti(35)}renderLessons()}
function lessonContent(){let l=byS(subject)[currentLesson];$('lessonContent').innerHTML=`<h2 class="title">${l.icon} ${l.title}</h2><p style="font-size:18px">${l.summary}</p><div class="grid two"><div><h3>مصطلحات</h3>${l.terms.map(t=>`<div class="term">${t}</div>`).join('')}</div><div><h3>تواريخ وأعلام وأمكنة</h3><div class="timeline">${l.dates.length?l.dates.map(t=>`<div>${t}</div>`).join(''):'<div>لا توجد تواريخ مركزية</div>'}</div><div>${l.people.map(p=>`<span class="badge">${p}</span>`).join('')}${l.places.map(p=>`<span class="badge">${p}</span>`).join('')}</div></div></div><h3>مهارات وأسئلة امتحانية</h3>${l.skills.map(s=>`<div class="term"><b>مهارة:</b> ${s}</div>`).join('')}${l.exam.map(s=>`<div class="term"><b>سؤال:</b> ${s}</div>`).join('')}<div class="arena"><h3>تحدي سريع</h3><div id="quiz"></div></div><div class="actions"><button class="btn green" onclick="mark('${l.id}')">أنجزت المحطة</button><button class="btn gold" onclick="speak(\`${(l.title+'. '+l.summary).replaceAll('`','')}\`)">قراءة صوتية</button><button class="btn red" onclick="miniBoss('${l.id}')">زعيم الدرس</button></div>`;let q=$('quiz');l.quiz.forEach((qu,qi)=>{let d=document.createElement('div');d.innerHTML='<p><b>'+(qi+1)+'. '+qu[0]+'</b></p>';let [so,sc]=shuffleOpts(qu[1],qu[2]);so.forEach((op,i)=>{let b=document.createElement('button');b.className='opt';b.textContent=op;b.onclick=()=>check(b,i,sc);d.appendChild(b)});q.appendChild(d)})}
function shuffleOpts(opts,c){let idx=opts.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}return[idx.map(i=>opts[i]),idx.indexOf(c)]} function check(btn,i,c){let p=btn.parentElement;if(p.dataset.locked)return;p.dataset.locked=1;[...p.querySelectorAll('.opt')].forEach((o,idx)=>{if(idx===c)o.classList.add('correct');if(o===btn&&idx!==c)o.classList.add('wrong');o.disabled=true});if(i===c){addXP(8);beep('success');toast('صحيح +8 XP')}else{beep('error');toast('الجواب ظهر بالأخضر')}} function speak(txt){if('speechSynthesis'in window){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(txt);u.lang='ar-MA';u.rate=.92;speechSynthesis.speak(u)}}
function norm(s){return (s||'').replace(/[أإآ]/g,'ا').replace(/ة/g,'ه').replace(/[ىي]/g,'ي').toLowerCase()} function AI(){$('ai').innerHTML=`<div class="card aiPanel"><h2 class="title">🔍 الباحث الذكي</h2><p>اكتب سؤالك أو مفهوماً وستظهر أهم الدروس المرتبطة من قاعدة المعطيات، أو اطلب شرحاً ذكياً تفاعلياً.</p><div class="grid two"><input id="aiQ" class="input" placeholder="مثال: لماذا تعد نيجيريا غنية وضعيفة التنمية؟" onkeydown="if(event.key==='Enter')smart()"><button class="btn gold" onclick="smart()">🔎 بحث داخلي</button></div><div class="actions" style="margin-top:10px;flex-wrap:wrap"><button class="btn blue" onclick="askAI()">✨ اسأل المساعد الذكي</button><button class="btn ghost" onclick="quick('نيجيريا')">نيجيريا</button><button class="btn ghost" onclick="quick('النهج الجغرافي')">النهج الجغرافي</button><button class="btn ghost" onclick="quick('القضية الفلسطينية')">فلسطين</button><button class="btn ghost" onclick="quick('الحرب العالمية الثانية')">الحرب ع.الثانية</button><button class="btn ghost" onclick="quick('التنمية المستدامة')">التنمية المستدامة</button></div><div id="aiR" class="aiResult">💡 اكتب سؤالك ثم اختر «بحث داخلي» للنتائج الفورية من الدروس، أو «اسأل المساعد الذكي» لشرح تفاعلي مبسط.</div></div>`} function quick(q){$('aiQ').value=q;smart()} function smart(){let q=$('aiQ').value.trim();if(!q)return toast('اكتب سؤالاً');let words=norm(q).split(/\s+/).filter(w=>w.length>1);let ranked=lessons().map(l=>{let text=norm(l.title+' '+l.summary+' '+l.terms.join(' ')+' '+l.dates.join(' ')+' '+l.people.join(' ')+' '+l.places.join(' '));let sc=words.reduce((a,w)=>a+(text.includes(w)?1:0),0)+(norm(l.title).includes(norm(q))?5:0);return [l,sc]}).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]);if(!ranked.length){$('aiR').innerHTML=`<p>لم أجد تطابقاً مباشراً. جرّب كلمة مفتاحية أخرى، أو اضغط «✨ اسأل المساعد الذكي» للحصول على شرح.</p>`;return}let b=ranked[0][0];let others=ranked.slice(1,3).map(x=>x[0]);$('aiR').innerHTML=`<div class="term" style="border-right:4px solid var(--blue,#1A6FA8)"><h3>${b.icon} ${b.title}</h3><p>${b.summary}</p><h4>🔑 مصطلحات:</h4><ul>${b.terms.slice(0,5).map(t=>`<li>${t}</li>`).join('')}</ul>${b.dates.length?`<h4>📅 تواريخ:</h4>${b.dates.map(t=>`<span class="badge">${t}</span>`).join('')}`:''}${b.people.length?`<h4>👤 أعلام:</h4>${b.people.map(t=>`<span class="badge">${t}</span>`).join('')}`:''}<h4>✍️ صيغة جواب نموذجية:</h4><p>عرّف المفهوم، ثم استخرج المعطى من الوثيقة/الخريطة، ثم اربطه بسياق الدرس في خلاصة مركزة.</p></div>${others.length?`<h4 style="margin-top:14px">📚 دروس مرتبطة أيضاً:</h4><div class="actions" style="flex-wrap:wrap">${others.map(o=>`<button class="btn ghost" onclick="quick('${o.title.replace(/'/g,'')}')">${o.icon} ${o.title}</button>`).join('')}</div>`:''}`;addXP(3);beep('success')}

async function askAI(){let q=$('aiQ').value.trim();if(!q)return toast('اكتب سؤالاً أولاً');$('aiR').innerHTML=`<p>⏳ المساعد الذكي يفكر...</p>`;
let ctx=lessons().map(l=>l.title+': '+l.summary).join('\n').slice(0,4000);
let prompt=`أنت مساعد تعليمي لطيف لتلاميذ السنة الثالثة إعدادي بالمغرب في مادة الاجتماعيات. أجب بالعربية الفصحى المبسطة، بإيجاز وبأسلوب محفّز، معتمداً على سياق الدروس التالي عند الإمكان. إذا كان السؤال خارج المادة، وجّه التلميذ بلطف.\n\nسياق الدروس:\n${ctx}\n\nسؤال التلميذ: ${q}\n\nأجب في فقرة قصيرة واضحة ثم أعطِ نصيحة للمراجعة في سطر واحد.`;
try{
 let r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
 if(!r.ok)throw new Error('offline');
 let data=await r.json();
 let txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'تعذر الحصول على إجابة.';
 $('aiR').innerHTML=`<div class="term" style="border-right:4px solid var(--gold,#f7c948)"><h4>✨ المساعد الذكي:</h4><p style="white-space:pre-wrap;line-height:1.9">${txt.replace(/</g,'&lt;')}</p></div>`;
 addXP(5);beep('success');
}catch(e){
 $('aiR').innerHTML=`<p>📡 المساعد الذكي التفاعلي متاح فقط عند الاتصال بالإنترنت داخل منصة claude.ai. سأعرض لك الآن نتائج البحث الداخلي بدلاً من ذلك:</p>`;
 setTimeout(smart,400);

function battleStart(){$('battle').innerHTML=`<div class="card" style="text-align:center"><h2 class="title">معركة المعرفة</h2><div class="enemy">🐉</div><p>اختر المادة وعدد الأسئلة ثم اهزم تنين الجهوي.</p>
<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0">
<select id="bSubj" class="opt" style="max-width:200px"><option value="all">كل المواد</option><option value="history">التاريخ</option><option value="geo">الجغرافيا</option><option value="civic">التربية على المواطنة</option></select>
<select id="bNum" class="opt" style="max-width:160px"><option value="10">10 أسئلة</option><option value="15">15 سؤالاً</option><option value="20" selected>20 سؤالاً</option><option value="30">30 سؤالاً</option><option value="999">كل الأسئلة</option></select>
</div>
<button class="btn red" onclick="startBattle()">ابدأ القتال</button></div>`} function pool(n=10,subj="all"){let p=[];lessons().forEach(l=>{if(subj!=="all"&&l.subject!==subj)return;l.quiz.forEach(q=>{let [so,sc]=shuffleOpts(q[1],q[2]);p.push({l:l.title,i:l.icon,q:q[0],o:so,c:sc,s:l.subject})})});p.sort(()=>Math.random()-.5);return n>=p.length?p:p.slice(0,n)} function startBattle(){let sj=($('bSubj')||{}).value||'all';let nn=parseInt(($('bNum')||{}).value||20);battlePool=pool(nn,sj);battleIndex=0;battleScore=0;hp=100;renderBattle()} function renderBattle(){let q=battlePool[battleIndex];if(!q)return battleResult();$('battle').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between"><div><h2>🐉 الزعيم المعرفي</h2><small>السؤال ${battleIndex+1}/${battlePool.length} • ${battleScore} نقطة</small></div><div class="enemy">🐉</div></div><div class="health"><span style="width:${hp}%"></span></div><div class="white card" style="margin-top:14px"><h2>${q.i} ${q.q}</h2>${q.o.map((op,i)=>`<button class="opt" onclick="ansBattle(${i})">${op}</button>`).join('')}</div></div>`} function ansBattle(i){let q=battlePool[battleIndex];if(!q)return;if(i===q.c){battleScore++;hp=Math.max(0,hp-12);addXP(12);beep('success')}else{hp=Math.min(100,hp+4);beep('error')}battleIndex++;setTimeout(renderBattle,650)} 
const TEACHER_NOTES={

 mid:{msg:"👏 أداء جيد ومشجّع! الأساس حاضر ويحتاج إلى صقل وتثبيت.",tips:["ركّز على الأخطاء المتكرّرة: أعد طرحها كأسئلة قصيرة بعد يومين (المراجعة المتباعدة).","اربط كل مفهوم بمثال محلي من محيط المتعلّم ليسهل تذكّره.","استعمل البطاقات السحرية لحفظ المصطلحات والتواريخ المتبقية.","قسّم الدرس إلى وحدات صغيرة وراجع وحدة واحدة كل جلسة."]},

};
const GENERAL_TRICKS=["حيلة التواريخ: اربط التاريخ بحدث قريب من حياة التلميذ ليرسخ.","حيلة المصطلح: لخّص كل مصطلح في كلمة-مفتاح واحدة.","حيلة الخريطة: لوّن كل مجال بلون ثابت طوال السنة.","حيلة النهج الجغرافي: وصف ← تفسير ← تعميم، رتّبها دائماً بهذا الترتيب.","حيلة المنهجية: في كل جواب اكتب «تعريف + معطى + ربط» لتضمن نقطة كاملة."];
function teacherNote(pct,subj){let k=pct>=80?'high':pct>=50?'mid':'low';let n=TEACHER_NOTES[k];let tricks=GENERAL_TRICKS.slice().sort(()=>Math.random()-.5).slice(0,3);
 return `<div class="white card" style="margin-top:16px;text-align:right;border-top:5px solid var(--gold,#f7c948)"><h3 style="color:var(--blue,#1A6FA8)">👨‍🏫 ركن الأستاذ — تعليق وحزمة نصائح</h3><p style="font-weight:700">${n.msg}</p><h4>📌 نصائح بيداغوجية مقترحة:</h4><ul style="line-height:2">${n.tips.map(t=>`<li>${t}</li>`).join('')}</ul><h4>🎯 حيل وذكاءات للمراجعة:</h4><ul style="line-height:2">${tricks.map(t=>`<li>${t}</li>`).join('')}</ul><p style="margin-top:10px;color:var(--muted,#667085);font-size:.9em">ذ. أحمد بوعمود — مؤسسة الحنان الخاصة | 2025-2026</p></div>`;}

function battleResult(){let pct=Math.round(battleScore/battlePool.length*100);if(pct>=70)confetti(75);let subj=(battlePool[0]||{}).s||'all';$('battle').innerHTML=`<div class="card" style="text-align:center"><div style="font-size:90px">${pct>=80?'🏆':pct>=50?'🛡️':'🌱'}</div><h2>${pct>=80?'انتصار ساحق!':pct>=50?'أداء جيد':'لا تستسلم'}</h2><p style="font-size:1.3em;font-weight:800">${battleScore} / ${battlePool.length} • ${pct}%</p><button class="btn red" onclick="startBattle()">إعادة المعركة</button></div>`+teacherNote(pct,subj)}
function miniBoss(id){let l=lessons().find(x=>x.id===id);battlePool=l.quiz.map(q=>{let [so,sc]=shuffleOpts(q[1],q[2]);return{l:l.title,i:l.icon,q:q[0],o:so,c:sc}});battleIndex=0;battleScore=0;hp=100;show('battle');setTimeout(renderBattle,80)}

function flash(){flashItems=[];lessons().forEach(l=>{l.terms.forEach(t=>flashItems.push({f:t.split(':')[0],b:t,icon:l.icon}));l.dates.forEach(t=>flashItems.push({f:t.split(':')[0],b:t,icon:l.icon}))});$('flash').innerHTML=`<div class="card"><h2 class="title">بطاقات سحرية</h2><div id="flashCard" class="flashCard" onclick="flip()">...</div><div class="actions" style="margin-top:14px"><button class="btn green" onclick="nextFlash()">بطاقة جديدة</button><button class="btn gold" onclick="speak(currentFlash.b)">قراءة</button></div></div>`;nextFlash()} function nextFlash(){currentFlash=flashItems[Math.floor(Math.random()*flashItems.length)];flipped=false;$('flashCard').classList.remove('flip');$('flashCard').innerHTML=`<div><div style="font-size:56px">${currentFlash.icon}</div>${currentFlash.f}<br><small>اضغط للقلب</small></div>`} function flip(){flipped=!flipped;$('flashCard').classList.toggle('flip',flipped);$('flashCard').innerHTML=flipped?currentFlash.b:currentFlash.f}
function missions(){let d=done().length;$('missions').innerHTML=`<div class="grid three"><div class="achievement ${d>=3?'unlocked':''}"><div class="cup">📚</div><div><b>أنجز 3 دروس</b><br>${Math.min(d,3)}/3</div></div><div class="achievement"><div class="cup">🐉</div><div><b>اربح معركة</b><br>تحدي يومي</div></div><div class="achievement"><div class="cup">🎡</div><div><b>دوّر العجلة</b><br>حظ ومعرفة</div></div></div><div class="card" style="margin-top:16px"><h2 class="title">خطة 20 دقيقة</h2><ol><li>بطاقة سحرية.</li><li>درس من الخريطة.</li><li>معركة معرفة.</li><li>سؤال في الباحث الذكي.</li></ol></div>`} function achievements(){let d=done().length,ach=[['🚀','بداية الرحلة',xp>=1],['📚','قارئ الدروس',d>=3],['🧠','جامع المصطلحات',xp>=150],['🐉','مقاتل المعرفة',xp>=300],['🏆','بطل كأس الحنان',xp>=700],['👑','أسطورة الجهوي',xp>=1000]];$('achievements').innerHTML=`<div class="grid three">${ach.map(a=>`<div class="achievement ${a[2]?'unlocked':''}"><div class="cup">${a[0]}</div><div><b>${a[1]}</b><br>${a[2]?'مفتوح':'مغلق'}</div></div>`).join('')}</div>`}
function teacher(){let opts=lessons().map((l,i)=>`<option value="${i}">${l.icon} ${l.title}</option>`).join('');$('teacher').innerHTML=`<div class="white card"><h2 class="title">وضع الأستاذ</h2><select id="ts" class="input" onchange="plan()">${opts}</select><div id="plan" style="margin-top:14px"></div></div>`;plan()} function plan(){let l=lessons()[+$('ts').value];$('plan').innerHTML=`<div class="grid two"><div><h3>${l.title}</h3><div class="term"><b>مدخل محفز:</b> صورة/سؤال قصير ثم ربط بالمفهوم المركزي.</div>${l.skills.map(s=>`<div class="term">${s}</div>`).join('')}</div><div><h3>سيناريو 12 دقيقة</h3><div class="term">2د: تمهيد</div><div class="term">4د: مصطلحات</div><div class="term">3د: وثيقة/خريطة</div><div class="term">3د: تحدي وخلاصة</div></div></div>`}
function cert(){let name=localStorage.getItem(LS.name)||'';$('certificate').innerHTML=`<div class="white card"><h2 class="title">شهادة تقدير</h2><input class="input" id="studentName" placeholder="اسم التلميذ(ة)" value="${name}" oninput="localStorage.setItem(LS.name,this.value);drawCert()"><div id="certBox" class="certificate" style="margin-top:16px"></div><button class="btn gold" onclick="window.print()">طباعة الشهادة</button></div>`;drawCert()} function drawCert(){let n=($('studentName')&&$('studentName').value)||'التلميذ(ة) المجتهد(ة)';let r=rank()[0];$('certBox').innerHTML=`<h1>🏆 شهادة تقدير</h1><h2>${n}</h2><p>تقديراً لاجتهاده في رحلة الجهوي لمادة الاجتماعيات.</p><h3>الرتبة: ${r} — الرصيد: ${xp} XP</h3><p>إعداد الأستاذ أحمد بوعمود — مؤسسة الحنان</p>`}
function openWheel(){modal(`<div style="text-align:center"><div style="font-size:42px;color:#f7c948">▼</div><div id="wheel" class="wheel">🎡</div><button class="btn gold" onclick="spinWheel()" style="margin-top:15px">دوّر العجلة</button><p id="wheelResult">اربح XP أو درساً عشوائياً.</p></div>`)} function spinWheel(){wheelDeg+=720+Math.floor(Math.random()*720);$('wheel').style.transform=`rotate(${wheelDeg}deg)`;setTimeout(()=>{if(Math.random()>.5){addXP(40);$('wheelResult').textContent='ربحت 40 XP 🎉'}else{let l=lessons()[Math.floor(Math.random()*lessons().length)];$('wheelResult').textContent='درس الحظ: '+l.icon+' '+l.title}confetti(35)},2300)}
let deferredPrompt=null;
